# PostgreSQL 数据库连接（主存储）
database:
  host: "your-pg-hostname"
  port: 5432
  name: "datapulse"
  user: "your-username"
  password: "CHANGE_ME_PASSWORD"

# NAS / 本地路径，仅用于 Embedding 向量文件（FAISS 需要本地磁盘）
storage:
  base_path: "./nas"

# JWT 签名密钥（请替换为随机长字符串）
auth:
  secret_key: "CHANGE_ME_SECRET_KEY"

# ─── 以下配置已迁移至数据库 system_config 表，通过配置中心 UI 管理 ────────────
# embedding / similarity / pipeline / llm / labels 等均在 UI 中按 dataset 配置
